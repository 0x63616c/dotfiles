# espanso default config.
# Symlink target for:
#   ~/Library/Application Support/espanso/config/default.yml
#
# Defaults are fine for typo-fixing; this file mostly exists so espanso has a
# valid config dir. Tweak here if you want a different backend or to disable the
# search bar shortcut.

# Clipboard backend is the most reliable for word-replacement on macOS.
backend: Clipboard

# Turn off the built-in search shortcut (ALT+SPACE) — reclaim the chord.
search_shortcut: OFF
