; Split-Flap display firmware — ESP32
; Build:  pio run
; Flash:  pio run -t upload
; Monitor: pio device monitor
;
; Two hardware profiles share one codebase:
;   [env:bringup]  -> ONE module wired straight to ESP32 GPIO (breadboard, first light)
;   [env:board]    -> the full 4x16 display over a chained 74HC595/74HC165 bus
; Select with:  pio run -e bringup   (default)  or  pio run -e board

[platformio]
default_envs = bringup

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    ; async web stack (serves the control app + JSON API + status WebSocket)
    esp32async/ESPAsyncWebServer @ ^3.6.0
    esp32async/AsyncTCP @ ^3.3.2
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    -DCORE_DEBUG_LEVEL=1

; ---- Profile 1: single-module bring-up (no PCB needed) ----
[env:bringup]
build_flags =
    ${env.build_flags}
    -DDRIVER_DIRECT_GPIO=1
    -DROWS=1
    -DCOLS=1

; ---- Profile 2: full 4x16 board over the shift-register chain ----
[env:board]
build_flags =
    ${env.build_flags}
    -DDRIVER_SHIFT_CHAIN=1
    -DROWS=4
    -DCOLS=16
