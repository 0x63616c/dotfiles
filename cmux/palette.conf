# organize-workspaces palette — curated colour + icon per repo.
#
# Format, one repo per line, whitespace-separated:
#     <name>  <#RRGGBB|->  [sf-symbol-icon]
#
#   <name>  repo basename, lowercase (same string that becomes the group name)
#   colour  #RRGGBB, or `-` to let the name-hash pick one
#   icon    SF Symbol name, or `-`/omitted to let the name-hash pick one
#
# `#` starts a comment. Blank lines ignored. Anything not listed here gets a
# deterministic colour + icon hashed from its name — stable across runs, so an
# unlisted repo still keeps the same look every time.
#
# Check what a name resolves to (and whether it came from here or the hash):
#     organize-workspaces test <name>

world-wide-webb        #FF9F43  flask
organizer              #B9770E  square.grid.2x2
dotfiles               #27AE60  gearshape
the-workflow-engine    #8E44AD  arrow.triangle.branch
split-flap             #34495E  rectangle.split.3x1
